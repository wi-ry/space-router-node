name: Build Home Node

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: space-router-node-macos-arm64
          - os: macos-13
            artifact: space-router-node-macos-x64
          - os: windows-latest
            artifact: space-router-node-windows-x64
          - os: ubuntu-latest
            artifact: space-router-node-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v0.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller homenode.spec
        env:
          SR_BUILD_VERSION: ${{ steps.version.outputs.version }}

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/space-router-node.exe "dist/${{ matrix.artifact }}.exe"
          else
            mv dist/space-router-node "dist/${{ matrix.artifact }}"
          fi

      - name: Smoke test
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            timeout 5 "dist/${{ matrix.artifact }}.exe" || true
          else
            timeout 5 "dist/${{ matrix.artifact }}" || true
          fi
        env:
          SR_COORDINATION_API_URL: http://localhost:9999
          SR_PUBLIC_IP: 127.0.0.1
          SR_UPNP_ENABLED: "false"

      # Build Linux packages (.deb and .rpm) via nfpm
      - name: Build Linux packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Install nfpm via go install
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          export PATH="$(go env GOPATH)/bin:$PATH"

          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for package version
          PKG_VERSION="${VERSION#v}"

          # Build .deb
          VERSION="${PKG_VERSION}" nfpm package --packager deb --target "dist/${{ matrix.artifact }}.deb"

          # Build .rpm
          VERSION="${PKG_VERSION}" nfpm package --packager rpm --target "dist/${{ matrix.artifact }}.rpm"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.exe
            dist/${{ matrix.artifact }}.deb
            dist/${{ matrix.artifact }}.rpm

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Space Router Home Node ${{ github.ref_name }}"
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
