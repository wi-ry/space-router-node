name: Build Home Node

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: space-router-node-macos-arm64
          - os: macos-15-large
            artifact: space-router-node-macos-x64
          - os: windows-latest
            artifact: space-router-node-windows-x64
          - os: ubuntu-latest
            artifact: space-router-node-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v0.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Freeze version into binary
        shell: bash
        run: |
          echo "BUILD_VERSION = \"${{ steps.version.outputs.version }}\"" > app/_build_version.py

      - name: Build binary
        run: pyinstaller homenode.spec

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/space-router-node.exe "dist/${{ matrix.artifact }}.exe"
          else
            mv dist/space-router-node "dist/${{ matrix.artifact }}"
          fi

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash tests/e2e/smoke_test.sh "dist/${{ matrix.artifact }}"
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
          SR_PUBLIC_IP: 127.0.0.1
          SR_UPNP_ENABLED: "false"
          SR_NODE_PORT: "19090"
          SR_WALLET_ADDRESS: "0x0000000000000000000000000000000000000001"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\tests\e2e\smoke_test.ps1 -Binary "dist\${{ matrix.artifact }}.exe"
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
          SR_PUBLIC_IP: 127.0.0.1
          SR_UPNP_ENABLED: "false"
          SR_NODE_PORT: "19090"
          SR_WALLET_ADDRESS: "0x0000000000000000000000000000000000000001"

      # Build Windows NSIS installer with WinSW service wrapper
      - name: Download WinSW
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $winsw_version = "3.0.0-alpha.11"
          $url = "https://github.com/winsw/winsw/releases/download/v${winsw_version}/WinSW-x64.exe"
          Invoke-WebRequest -Uri $url -OutFile "packaging/windows/WinSW-x64.exe"
          Write-Host "Downloaded WinSW ${winsw_version}"

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"

          # Check if NSIS is already pre-installed on the runner
          if (Test-Path $nsisPath) {
              Write-Host "NSIS already installed at $nsisPath"
              exit 0
          }

          # Retry choco install up to 3 times (Chocolatey CDN can be flaky)
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
              Write-Host "Installing NSIS (attempt $i/$maxRetries)..."
              choco install nsis -y --no-progress 2>&1
              # Verify makensis.exe actually exists (choco can return 0 with 0 packages on 503)
              if (Test-Path $nsisPath) {
                  Write-Host "NSIS installed successfully"
                  break
              }
              if ($i -lt $maxRetries) {
                  Write-Host "makensis.exe not found after install, retrying in 15 seconds..."
                  Start-Sleep -Seconds 15
              } else {
                  Write-Error "Failed to install NSIS after $maxRetries attempts"
                  exit 1
              }
          }

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"

          $version = "${{ steps.version.outputs.version }}"
          # Strip leading 'v' for installer version
          $pkg_version = $version -replace '^v', ''
          # Extract numeric-only version for VIProductVersion (X.X.X.X format)
          if ($pkg_version -match '^(\d+\.\d+\.\d+)') {
              $numeric_version = "$($Matches[1]).0"
          } else {
              $numeric_version = "0.0.0.0"
          }

          makensis /DVERSION=$pkg_version `
                   /DNUMERIC_VERSION=$numeric_version `
                   /DBINARY="..\..\dist\${{ matrix.artifact }}.exe" `
                   /DWINSW="WinSW-x64.exe" `
                   packaging\windows\installer.nsi

          Move-Item "packaging\windows\space-router-node-${pkg_version}-setup.exe" `
                    "dist\${{ matrix.artifact }}-setup.exe"
          Write-Host "Built installer: dist\${{ matrix.artifact }}-setup.exe"

      # ---- macOS code signing & notarization (skipped if secrets not set) ----
      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

          # Add keychain to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign macOS binary
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          codesign --force --options runtime \
            --sign "Developer ID Application: Gluwa ($APPLE_TEAM_ID)" \
            --timestamp \
            "dist/${{ matrix.artifact }}"

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          # Create a zip for notarization (notarytool requires zip/dmg/pkg)
          ditto -c -k --keepParent "dist/${{ matrix.artifact }}" "$RUNNER_TEMP/notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the ticket
          xcrun stapler staple "dist/${{ matrix.artifact }}"

      # Build .pkg from the signed+notarized binary so the payload passes Gatekeeper
      - name: Build macOS package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG_VERSION="${VERSION#v}"
          bash packaging/macos/build_pkg.sh \
            --binary "dist/${{ matrix.artifact }}" \
            --version "${PKG_VERSION}" \
            --output "dist/${{ matrix.artifact }}.pkg"

      - name: Sign macOS package
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          PKG="dist/${{ matrix.artifact }}.pkg"
          if [ -f "$PKG" ]; then
            productsign --sign "Developer ID Installer: Gluwa ($APPLE_TEAM_ID)" \
              "$PKG" "$PKG.signed"
            mv "$PKG.signed" "$PKG"
          fi

      - name: Notarize macOS package
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          PKG="dist/${{ matrix.artifact }}.pkg"
          if [ -f "$PKG" ]; then
            xcrun notarytool submit "$PKG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$PKG"
          fi

      - name: Clean up macOS keychain
        if: always() && runner.os == 'macOS' && env.KEYCHAIN_PATH != ''
        shell: bash
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # ---- Windows code signing (skipped if secrets not set) ----
      - name: Sign Windows binary
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_PFX != ''
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          # Decode PFX from secret
          $pfxBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX)
          $pfxPath = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          # Find signtool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" `
            -Recurse -Filter "signtool.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          # Sign the binary
          & $signtool.FullName sign /f $pfxPath /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            "dist\${{ matrix.artifact }}.exe"

          # Clean up
          Remove-Item $pfxPath -Force

      # Build Linux packages (.deb and .rpm) via nfpm
      - name: Build Linux packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Install nfpm via go install
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          export PATH="$(go env GOPATH)/bin:$PATH"

          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for package version
          PKG_VERSION="${VERSION#v}"

          # Build .deb
          VERSION="${PKG_VERSION}" nfpm package --packager deb --target "dist/${{ matrix.artifact }}.deb"

          # Build .rpm
          VERSION="${PKG_VERSION}" nfpm package --packager rpm --target "dist/${{ matrix.artifact }}.rpm"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.exe
            dist/${{ matrix.artifact }}-setup.exe
            dist/${{ matrix.artifact }}.deb
            dist/${{ matrix.artifact }}.rpm
            dist/${{ matrix.artifact }}.pkg

  build-gui:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: spacerouter-gui-macos-arm64
          - os: macos-15-large
            artifact: spacerouter-gui-macos-x64
          - os: windows-latest
            artifact: spacerouter-gui-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v0.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building GUI version: ${VERSION}"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pywebview

      - name: Freeze version into binary
        shell: bash
        run: |
          echo "BUILD_VERSION = \"${{ steps.version.outputs.version }}\"" > app/_build_version.py

      - name: Build GUI app
        run: pyinstaller spacerouter_gui.spec

      # ---- GUI smoke tests (before signing, after build) ----
      - name: GUI smoke test (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: bash tests/e2e/gui_smoke_test.sh "dist/SpaceRouter.app/Contents/MacOS/SpaceRouter"
        timeout-minutes: 3

      - name: GUI smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\tests\e2e\gui_smoke_test.ps1 -Binary "dist\SpaceRouter.exe"
        timeout-minutes: 3

      # ---- macOS code signing & notarization ----
      # Sign the .app BEFORE creating the .dmg so the .dmg contains the signed app.
      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign macOS app
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          codesign --force --deep --options runtime \
            --sign "Developer ID Application: Gluwa ($APPLE_TEAM_ID)" \
            --timestamp \
            "dist/SpaceRouter.app"

      # Create .dmg from the (now signed) .app bundle.
      # Retry because hdiutil can fail with "Resource busy" right after codesign
      # while Gatekeeper/XProtect finishes scanning the signed bundle.
      - name: Package macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -d "dist/SpaceRouter.app" ]; then
            for attempt in 1 2 3; do
              if hdiutil create -volname "SpaceRouter" \
                   -srcfolder "dist/SpaceRouter.app" \
                   -ov -format UDZO \
                   "dist/${{ matrix.artifact }}.dmg"; then
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "hdiutil failed (attempt $attempt/3), retrying in 5s..."
                sleep 5
              fi
            done
            if [ ! -f "dist/${{ matrix.artifact }}.dmg" ]; then
              echo "All hdiutil attempts failed"
              exit 1
            fi
          fi

      - name: Notarize macOS DMG
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          DMG="dist/${{ matrix.artifact }}.dmg"
          if [ -f "$DMG" ]; then
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$DMG"
          fi

      - name: Clean up macOS keychain
        if: always() && runner.os == 'macOS' && env.KEYCHAIN_PATH != ''
        shell: bash
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # ---- Windows: rename and sign ----
      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "dist\SpaceRouter.exe") {
            Move-Item "dist\SpaceRouter.exe" "dist\${{ matrix.artifact }}.exe"
          }

      # ---- Windows code signing ----
      - name: Sign Windows binary
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_PFX != ''
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX)
          $pfxPath = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" `
            -Recurse -Filter "signtool.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          & $signtool.FullName sign /f $pfxPath /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            "dist\${{ matrix.artifact }}.exe"
          Remove-Item $pfxPath -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.exe
            dist/${{ matrix.artifact }}.dmg

  staging-e2e:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: staging-e2e
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: pip install "httpx[socks]>=0.27,<1"

      - name: Run staging E2E tests
        run: python tests/e2e/staging_e2e_test.py
        timeout-minutes: 5
        env:
          STAGING_NODE_IP: "159.223.44.4"
          STAGING_NODE_PORT: "9090"
          COORDINATION_API_URL: "https://coordination.spacerouter.org"
          GATEWAY_HOST: "gateway.spacerouter.org"
          GATEWAY_HTTP_PORT: "8080"
          GATEWAY_SOCKS5_PORT: "1080"
          SR_API_KEY: ${{ secrets.SR_STAGING_API_KEY }}
          NODE_LABEL: "staging-ci"

  release:
    needs: [build, build-gui]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Space Router Home Node ${{ github.ref_name }}"
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
